<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Zinely — Hero Variations</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="styles.css" />
<style>
  body { background: #f0eee9; }
  .hero-eyebrow { display: inline-flex; align-items: center; gap: 10px; padding: 8px 14px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 999px; font-size: 13px; color: var(--slate); }
  .hero-eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: #22C55E; box-shadow: 0 0 0 4px rgba(34,197,94,0.18); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/foundation.jsx"></script>
<script type="text/babel" src="components/hero-variants.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function CanvasApp() {
  return (
    <DesignCanvas>
      <DCSection id="heroes" title="Hero variations" subtitle="Three directions for the Zinely top-of-page — same brand, different visual rhythm.">
        <DCArtboard id="a" label="A · Premium centered (matches main site)" width={1280} height={760}>
          <HeroVariantA />
        </DCArtboard>
        <DCArtboard id="b" label="B · Split with live activity" width={1280} height={760}>
          <HeroVariantB />
        </DCArtboard>
        <DCArtboard id="c" label="C · Editorial dark (Issue 01)" width={1280} height={760}>
          <HeroVariantC />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<CanvasApp />);
</script>
</body>
</html>
