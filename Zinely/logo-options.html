<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Zinely — Logo Options</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />

<style>
  body { margin: 0; font-family: 'Inter', sans-serif; background: #F1F5FB; }
</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="logo-options.jsx"></script>

<div id="root"></div>

<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  function App() {
    const W = 460, H = 200;
    return (
      <DesignCanvas title="Zinely Logo · 10 Heart Variations" subtitle="All keep the chat bubble silhouette + cyan palette · click any tile to focus">
        <DCSection id="hearts" title="Heart treatments">
          <DCArtboard id="01" label="01 · Bold Heart" width={W} height={H}><Logo01 /></DCArtboard>
          <DCArtboard id="02" label="02 · Outline Heart" width={W} height={H}><Logo02 /></DCArtboard>
          <DCArtboard id="03" label="03 · Notch Heart" width={W} height={H}><Logo03 /></DCArtboard>
          <DCArtboard id="04" label="04 · Heart Cutout" width={W} height={H}><Logo04 /></DCArtboard>
          <DCArtboard id="05" label="05 · Heartbeat" width={W} height={H}><Logo05 /></DCArtboard>
          <DCArtboard id="06" label="06 · Inset Heart" width={W} height={H}><Logo06 /></DCArtboard>
          <DCArtboard id="07" label="07 · Sparkle Heart" width={W} height={H}><Logo07 /></DCArtboard>
          <DCArtboard id="08" label="08 · Layered Hearts" width={W} height={H}><Logo08 /></DCArtboard>
          <DCArtboard id="09" label="09 · Heart Tail" width={W} height={H}><Logo09 /></DCArtboard>
          <DCArtboard id="10" label="10 · Tilted Heart" width={W} height={H}><Logo10 /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  root.render(<App />);
</script>

</body>
</html>
